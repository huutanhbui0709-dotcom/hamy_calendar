<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập Admin | CFHM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["'Be Vietnam Pro'", 'Inter', 'sans-serif'] },
          colors: {
            brand: { 50: '#E3F2ED', 100: '#C7E5DB', 400: '#3BAF8E', 500: '#0E7C66', 600: '#0A6655', 700: '#08463A' },
            accent: { 50: '#E7E9F7', 100: '#CFD3F0', 400: '#6477D0', 500: '#3A4DB0', 600: '#2E3E99', 700: '#232F70' },
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Be Vietnam Pro', 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-brand-50 to-accent-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-3xl shadow-xl shadow-brand-500/5 border border-brand-100 p-8 space-y-6">
    <div class="text-center space-y-2">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-brand-50 text-brand-600 mb-2">
        <i class="fa-solid fa-user-shield fa-2xl"></i>
      </div>
      <h1 class="text-2xl font-extrabold text-gray-800 tracking-tight">CFHM CALENDAR</h1>
      <p class="text-sm text-gray-500 font-medium">Đăng nhập cổng quản trị dành cho Admin</p>
    </div>

    <form id="login-form" class="space-y-5">
      <div id="error-msg" class="hidden flex items-center gap-2 p-3.5 text-sm text-red-700 bg-red-50 border border-red-200 rounded-xl font-medium">
        <i class="fa-solid fa-circle-exclamation shrink-0"></i>
        <span id="error-text"></span>
      </div>

      <div class="space-y-1.5">
        <label for="username" class="block text-xs font-bold text-gray-400 uppercase tracking-widest">Tên đăng nhập</label>
        <div class="relative">
          <i class="fa-solid fa-user absolute left-4 top-3.5 text-gray-400"></i>
          <input type="text" id="username" required autocomplete="username"
            class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/15 outline-none text-sm font-semibold transition-all bg-gray-50/50 focus:bg-white"
            placeholder="Nhập tên đăng nhập...">
        </div>
      </div>

      <div class="space-y-1.5">
        <label for="password" class="block text-xs font-bold text-gray-400 uppercase tracking-widest">Mật khẩu</label>
        <div class="relative">
          <i class="fa-solid fa-key absolute left-4 top-3.5 text-gray-400"></i>
          <input type="password" id="password" required autocomplete="current-password"
            class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/15 outline-none text-sm font-semibold transition-all bg-gray-50/50 focus:bg-white"
            placeholder="••••••••">
        </div>
      </div>

      <button type="submit" id="btn-submit"
        class="w-full bg-brand-600 hover:bg-brand-700 text-white py-3 rounded-xl font-bold text-sm tracking-wide transition-all shadow-md shadow-brand-600/10 hover:shadow-brand-600/20 active:scale-[0.98] flex items-center justify-center gap-2">
        <span>Đăng nhập</span>
        <i class="fa-solid fa-arrow-right-to-bracket text-xs"></i>
      </button>
    </form>
    
    <div class="text-center">
      <a href="/schedule" class="text-xs font-semibold text-brand-600 hover:text-brand-800 transition-colors">
        <i class="fa-solid fa-calendar-days mr-1"></i> Trang đăng ký ca của Nhân viên
      </a>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errEl = document.getElementById('error-msg');
      const errTxt = document.getElementById('error-text');
      const btn = document.getElementById('btn-submit');
      
      errEl.classList.add('hidden');
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) return;

      btn.disabled = true;
      const originalText = btn.innerHTML;
      btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-1"></i> Đang xác thực...`;

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          throw new Error(data.error || 'Đăng nhập không thành công.');
        }

        // Chuyển hướng về trang chủ Admin
        window.location.href = '/';
      } catch (err) {
        errTxt.textContent = err.message;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    });

    // Tự động kích hoạt root admin nếu chưa có
    (async function initRoot() {
      try {
        await fetch('/api/admin/login');
      } catch(e) {}
    })();
  </script>
</body>
</html>
